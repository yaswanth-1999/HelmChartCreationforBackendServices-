replicaCount: 2

image:
  repository: your-dockerhub/backend-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

config:
  APP_ENV: dev
  LOG_LEVEL: info

secret:
  DB_USERNAME: "admin"
  DB_PASSWORD: "admin123"
